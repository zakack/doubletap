# osu-intercept configuration
#
# The daemon grabs the listed keyboard devices, applies a SOCD-cleaning
# state machine to two configurable keys (k1/k2 -> v1/v2), and re-emits
# everything via a single uinput virtual keyboard. It also plays a click
# sound through PipeWire on every virtual keypress.
#
# Copy this file to ~/.config/osu-intercept/config.yaml and edit it there;
# the daemon prefers that path over the installed copy in /usr/share.
# After editing, restart the daemon:
#   systemctl --user restart osu-intercept

# Keyboard devices to grab. REQUIRED. Use the stable /dev/input/by-id/*
# paths so symlinks survive replug (ls /dev/input/by-id/ and pick the
# *-event-kbd entry for your keyboard). Add as many entries as you like.
devices:
  - /dev/input/by-id/CHANGE-ME-event-kbd

# SOCD-cleaning mode. Both suppress the older key when both are held; they
# differ in what happens when one of two held keys is released:
#   toggle - reverting toggle (latching): releasing EITHER key re-presses
#            the other virtual key.
#   snappy - "Snappy Tappy" / last input wins: only releasing the ACTIVE
#            key falls back to the still-held one; releasing the already
#            suppressed key does nothing.
mode: toggle

# Key mapping. Codes can be symbolic ("KEY_Z") or numeric (44).
# See /usr/include/linux/input-event-codes.h for the full list.
keys:
  k1: KEY_Z
  k2: KEY_X
  v1: KEY_Z
  v2: KEY_X

# Audio click on each virtual keypress. `wav` defaults to the click sample
# installed alongside this file; point it at any 16/24/32-bit PCM WAV.
audio:
  enabled: true
  wav: /usr/share/osu-intercept/click.wav

# Identification of the virtual uinput keyboard.
uinput:
  name: "osu-intercept virtual keyboard"
